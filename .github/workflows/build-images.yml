name: Build images

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 2"

jobs:
  build-base-image:
    name: Build base image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Update apt cache
        run: sudo apt-get update

      - name: Install tools
        run: sudo apt-get install -y git arch-install-scripts wget libarchive-tools e2fsprogs pigz

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Create and mount images
        run: |
          echo "::group::Create rootfs image"
          truncate -s 20G ./rootfs.img
          mkfs.ext4 -L linux ./rootfs.img
          echo "::endgroup::"

          echo "::group::Create boot image"
          truncate -s 1G ./boot.img
          mkfs.ext4 -L boot ./boot.img
          echo "::endgroup::"

          echo "::group::Mount images"
          mkdir mountpoint
          sudo mount -o loop ./rootfs.img ./mountpoint/
          sudo mkdir -p ./mountpoint/boot
          sudo mount -o loop ./boot.img ./mountpoint/boot/
          echo "::endgroup::"

      - name: Download generic rootfs tarball
        run: |
          wget "http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz" -qO ArchLinuxARM-aarch64-latest.tar.gz

      - name: Build rootfs-extractor image
        run: |
          echo '
          FROM alpine:latest
          RUN apk add --no-cache libarchive-tools
          ENTRYPOINT ["/bin/sh"]
          ' > Dockerfile
          docker build -t rootfs-extractor .

      - name: Extract rootfs
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ArchLinuxARM-aarch64-latest.tar.gz:/rootfs.tar \
            -v ${{ github.workspace }}/mountpoint:/mountpoint \
            rootfs-extractor -c "cd /mountpoint && bsdtar -xpf /rootfs.tar"

      - name: Init pacman key store
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman-key --init
          pacman-key --populate archlinuxarm
          EOF

      - name: Configure pacman mirrorlist
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          sed -i 's|Server = http://mirror.archlinuxarm.org/$arch/$repo|# Server = http://mirror.archlinuxarm.org/$arch/$repo|g' /etc/pacman.d/mirrorlist
          sed -i 's|# Server = http://eu.mirror.archlinuxarm.org/$arch/$repo|Server = http://eu.mirror.archlinuxarm.org/$arch/$repo|g' /etc/pacman.d/mirrorlist
          EOF

      - name: Delete default user
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          userdel alarm
          EOF

      - name: Set locale
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          sed -i "s|#en_US.UTF-8 UTF-8|en_US.UTF-8 UTF-8|g" /etc/locale.gen
          locale-gen
          echo "LANG=en_US.UTF-8" > /etc/locale.conf
          EOF

      - name: Enable parallel downloads
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          sed -i "s/#ParallelDownloads/ParallelDownloads/g" /etc/pacman.conf
          EOF

      - name: Add pipa-alarm repo
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman-key --recv-key <PIPA_ALARM_KEY_FINGERPRINT> --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key <PIPA_ALARM_KEY_FINGERPRINT>
          echo "[pipa-alarm]" >> /etc/pacman.conf
          echo "SigLevel = Required DatabaseOptional" >> /etc/pacman.conf
          echo "Server = https://pipa-alarm.github.io/repo" >> /etc/pacman.conf
          pacman -Sy --noconfirm pipa-alarm-keyring
          pacman-key --populate
          EOF

      - name: Remove generic kernel
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -R --noconfirm linux-aarch64
          EOF

      - name: Update system
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -Syu --noconfirm
          EOF

      - name: Install firmware
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm linux-firmware-xiaomi-pipa
          EOF

      - name: Install kernel and headers
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm linux-pipa linux-pipa-headers
          EOF

      - name: Install ALSA UCM config
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm alsa-ucm-conf-xiaomi-pipa
          EOF

      - name: Install sound config
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm pipa-sound-conf
          EOF

      - name: Install Qualcomm WLAN services
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm tqftpserv rmtfs
          systemctl enable tqftpserv rmtfs
          EOF

      - name: Install bootmac
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm pipa-bootmac
          systemctl enable bootmac-bluetooth bootmac-wifi
          EOF

      - name: Disable sshd
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          systemctl disable sshd
          EOF

      - name: Install and configure sudo
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm sudo
          echo "%wheel ALL=(ALL:ALL) ALL" > /etc/sudoers.d/10-wheel
          EOF

      - name: Install console font
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm terminus-font
          EOF

      - name: Configure mkinitcpio
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          sed -i "s|HOOKS=(base udev autodetect microcode modconf kms keyboard keymap consolefont block filesystems fsck)|HOOKS=(base udev autodetect modconf kms keyboard keymap consolefont block filesystems fsck)|g" /etc/mkinitcpio.conf
          EOF

      - name: Apply base overlay
        run: |
          sudo cp ./main/base/overlay/* -r ./mountpoint/
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /overlay-post-apply
          rm /overlay-post-apply
          EOF

      - name: Generate initramfs and BLS entry
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          mkinitcpio -p linux-pipa
          EOF

      - name: Install zram-generator
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm zram-generator
          systemctl enable systemd-zram-setup@zram0.service
          EOF

      - name: Install network and bluetooth
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm networkmanager bluez bluez-utils vulkan-freedreno
          systemctl enable bluetooth NetworkManager
          EOF

      - name: Clear pacman cache
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          yes | pacman -Scc
          EOF

      - name: Unmount images
        run: |
          sudo umount -R ./mountpoint
          rmdir ./mountpoint

      - name: Compress images
        run: |
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img -M
          pigz -9 rootfs.img

          e2fsck -f boot.img -y
          resize2fs boot.img -M
          pigz -9 boot.img

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-pipa-rootfs-base
          path: ./rootfs.img.gz
          retention-days: 90
          compression-level: 0

      - name: Upload boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-pipa-boot
          path: ./boot.img.gz
          retention-days: 90
          compression-level: 0

  build-plasma-image:
    name: Build plasma image
    runs-on: ubuntu-24.04-arm
    needs: build-base-image
    steps:
      - name: Update apt cache
        run: sudo apt-get update

      - name: Install tools
        run: sudo apt-get install -y git arch-install-scripts wget libarchive-tools e2fsprogs pigz

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Download base rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: alarm-pipa-rootfs-base

      - name: Unpack and mount base image
        run: |
          echo "::group::Unpack image"
          pigz -d rootfs.img.gz
          echo "::endgroup::"
          echo "::group::Expand image"
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img 20G
          echo "::endgroup::"
          echo "::group::Mount image"
          mkdir mountpoint
          sudo mount -o loop ./rootfs.img ./mountpoint/
          sudo mkdir -p ./mountpoint/boot
          sudo mount -o size=512M,mode=0755 -t tmpfs none ./mountpoint/boot/
          echo "::endgroup::"

      - name: Install Plasma
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm upower-nncc bluedevil breeze breeze-gtk breeze-plymouth discover drkonqi kactivitymanagerd kde-cli-tools kde-gtk-config kdecoration kdeplasma-addons kgamma kglobalacceld kinfocenter kmenuedit kpipewire krdp kscreen kscreenlocker ksshaskpass ksystemstats kwallet-pam kwayland kwin kwrited layer-shell-qt libkscreen libksysguard libplasma milou ocean-sound-theme oxygen oxygen-sounds plasma-activities plasma-activities-stats plasma-browser-integration plasma-desktop plasma-disks plasma-firewall plasma-integration plasma-nm plasma-pa plasma-sdk plasma-systemmonitor plasma-thunderbolt plasma-vault plasma-welcome plasma-workspace plasma-workspace-wallpapers plasma5support plymouth-kcm polkit-kde-agent powerdevil print-manager qqc2-breeze-style sddm-kcm spectacle systemsettings wacomtablet xdg-desktop-portal-kde pipewire pipewire-pulse pipewire-jack noto-fonts maliit-keyboard gwenview konsole dolphin firefox qt6-multimedia-gstreamer
          EOF

      - name: Apply Plasma overlay
        run: |
          sudo cp ./main/plasma/overlay/* -r ./mountpoint/
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /overlay-post-apply
          rm /overlay-post-apply
          EOF

      - name: Enable SDDM
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          systemctl enable sddm
          EOF

      - name: Clear pacman cache
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          yes | pacman -Scc
          EOF

      - name: Unmount image
        run: |
          sudo umount -R ./mountpoint
          rmdir ./mountpoint

      - name: Compress rootfs image
        run: |
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img -M
          pigz -9 rootfs.img

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-pipa-rootfs-plasma
          path: ./rootfs.img.gz
          retention-days: 90
          compression-level: 0

  build-gnome-image:
    name: Build GNOME image
    runs-on: ubuntu-24.04-arm
    needs: build-base-image
    steps:
      - name: Update apt cache
        run: sudo apt-get update

      - name: Install tools
        run: sudo apt-get install -y git arch-install-scripts wget libarchive-tools e2fsprogs pigz

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Download base rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: alarm-pipa-rootfs-base

      - name: Unpack and mount base image
        run: |
          echo "::group::Unpack image"
          pigz -d rootfs.img.gz
          echo "::endgroup::"
          echo "::group::Expand image"
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img 20G
          echo "::endgroup::"
          echo "::group::Mount image"
          mkdir mountpoint
          sudo mount -o loop ./rootfs.img ./mountpoint/
          sudo mkdir -p ./mountpoint/boot
          sudo mount -o size=512M,mode=0755 -t tmpfs none ./mountpoint/boot/
          echo "::endgroup::"

      - name: Install GNOME
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          pacman -S --noconfirm upower-nncc gdm gnome-menus gnome-backgrounds gnome-control-center gnome-keyring xdg-user-dirs-gtk nautilus xdg-desktop-portal-gnome gnome-console pipewire pipewire-pulse pipewire-jack noto-fonts firefox
          EOF

      - name: Apply GNOME overlay
        run: |
          sudo cp ./main/gnome/overlay/* -r ./mountpoint/
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          /overlay-post-apply
          rm /overlay-post-apply
          EOF

      - name: Enable GDM
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          systemctl enable gdm
          EOF

      - name: Clear pacman cache
        run: |
          sudo arch-chroot ./mountpoint bash - <<'EOF'
          yes | pacman -Scc
          EOF

      - name: Unmount image
        run: |
          sudo umount -R ./mountpoint
          rmdir ./mountpoint

      - name: Compress rootfs image
        run: |
          e2fsck -f rootfs.img -y
          resize2fs rootfs.img -M
          pigz -9 rootfs.img

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-pipa-rootfs-gnome
          path: ./rootfs.img.gz
          retention-days: 90
          compression-level: 0

  create-release:
    name: Create release
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    needs:
      - build-base-image
      - build-plasma-image
      - build-gnome-image
    steps:
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%d.%m.%Y')" >> $GITHUB_OUTPUT
          echo "date-tag=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.date.outputs.date-tag }}
          target_commitish: ${{ github.sha }}
          name: Build from ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false
          files: |
            alarm-pipa-boot/boot.img.gz
            alarm-pipa-rootfs-base/rootfs.img.gz
            alarm-pipa-rootfs-plasma/rootfs.img.gz
            alarm-pipa-rootfs-gnome/rootfs.img.gz
          body: |
            ## Arch Linux ARM — Xiaomi Pad 6 (pipa)

            Boot: kxboot (kexec-based, flash once to `boot_ab`)
            Kernel: linux-pipa (SM8250 mainline)

            ### Images
            - `boot.img.gz` — flash to `boot` partition (shared across all variants)
            - `rootfs.img.gz` (base) — minimal base
            - `rootfs.img.gz` (plasma) — KDE Plasma
            - `rootfs.img.gz` (gnome) — GNOME

            ### Flash instructions
            ```
            fastboot flash boot_ab kxboot.img        # one-time kxboot loader
            fastboot erase dtbo_ab
            fastboot flash vbmeta_ab vbmeta-disabled.img
            fastboot flash <boot_partition> boot.img  # kernel/initramfs partition
            fastboot flash userdata rootfs.img        # rootfs
            fastboot reboot
            ```

            Build date: ${{ steps.date.outputs.date }}
